{% extends 'base.html' %}

{% block title %}Iniciar Sesión - DocuFlow{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-4">
        <div class="card shadow border-0">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <h2 class="text-primary fw-bold">📄 DocuFlow</h2>
                    <p class="text-muted">Ingresa tus credenciales para continuar</p>
                </div>
                
                <form action="{{ url_for('auth.login') }}" method="POST">
                    <div class="mb-3">
                        <label for="num_nomina" class="form-label">Número de Nómina</label>
                        <input type="text" class="form-control" id="num_nomina" name="num_nomina" placeholder="Ej: 12345" required autocomplete="off">
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">Ingresar Sistema</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
